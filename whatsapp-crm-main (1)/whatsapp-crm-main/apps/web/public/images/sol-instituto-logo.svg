<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Sol/Sun -->
  <circle cx="120" cy="100" r="60" fill="url(#sunGradient)" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Sol Text -->
  <text x="50" y="140" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#FFD700" stroke="#FF8C00" stroke-width="1">SOL</text>
  
  <!-- Instituto Terapêutico -->
  <text x="50" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="normal" fill="#666">instituto</text>
  <text x="120" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="normal" fill="#666">terapêutico</text>
  
  <!-- Main Title -->
  <text x="240" y="50" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#FF8C00">SOL INSTITUTO</text>
  <text x="240" y="85" font-family="Arial, sans-serif" font-size="24" font-weight="normal" fill="#28A745">Escola de Formação Profissional</text>
  
  <!-- Subtitle -->
  <text x="240" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#666">cursos presenciais e online</text>
</svg>
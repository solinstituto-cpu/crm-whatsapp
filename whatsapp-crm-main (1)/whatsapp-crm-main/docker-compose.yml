version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: crm_db
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d crm"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crm_redis
    ports:
      - "6379:6379"
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: crm_api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://user:password@db:5432/crm
      REDIS_URL: redis://redis:6379
      META_WA_PHONE_NUMBER_ID: ${META_WA_PHONE_NUMBER_ID}
      META_WA_TOKEN: ${META_WA_TOKEN}
      META_WA_APP_ID: ${META_WA_APP_ID}
      META_WA_APP_SECRET: ${META_WA_APP_SECRET}
      WA_VERIFY_TOKEN: ${WA_VERIFY_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - /app/dist
    networks:
      - crm_network
    restart: unless-stopped

  queue-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: crm_queue_worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://user:password@db:5432/crm
      REDIS_URL: redis://redis:6379
      META_WA_PHONE_NUMBER_ID: ${META_WA_PHONE_NUMBER_ID}
      META_WA_TOKEN: ${META_WA_TOKEN}
      META_WA_APP_ID: ${META_WA_APP_ID}
      META_WA_APP_SECRET: ${META_WA_APP_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    networks:
      - crm_network
    command: npm run dev:queue
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: crm_web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      API_URL: http://api:4000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - crm_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  crm_network:
    driver: bridge
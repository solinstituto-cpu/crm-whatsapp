# Configuração do Render para a API (apps/api)
# Documentação: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: crm-drm
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npm run build && npm run migrate:prod
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production

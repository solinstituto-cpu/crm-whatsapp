# Configuração do Render para a API
# Documentação: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: crm-drm
    runtime: node
    rootDir: api
    buildCommand: npm install && npm run build
    startCommand: node dist/src/main.js
    envVars:
      - key: NODE_ENV
        value: production

services:
  - type: web
    name: crm-api
    env: node
    plan: starter
    buildCommand: npm ci && npm install pg --no-save && node scripts/fix-migrations.js && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/wa/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: crm-postgres
          property: connectionString
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_BUSINESS_PHONE_ID
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v22.0
      - key: WHATSAPP_API_BASE_URL
        value: https://graph.facebook.com
      - key: WA_VERIFY_TOKEN
        value: sol123

databases:
  - name: crm-postgres
    plan: starter
    databaseName: crm_db
    user: crm_user